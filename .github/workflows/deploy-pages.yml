name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # نشر محتوى main كما هو إلى فرع gh-pages؛ وجود الفرع يفعّل
      # GitHub Pages تلقائيًا بدون أي إعداد يدوي
      - name: Publish to gh-pages branch
        run: git push --force origin HEAD:gh-pages
